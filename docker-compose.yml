services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: skzskz
      MYSQL_DATABASE: mir_igrushek_bd
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-pskzskz"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  web:
    build: .
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      DB_HOST: db
      DB_NAME: mir_igrushek_bd
      DB_USER: root
      DB_PASS: skzskz
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
